<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accounting Dashboard</title>
    <script src="sql-wasm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-raised: #273549;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-faint: #64748b;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --purple: #a78bfa;
            --pink: #f472b6;
            --teal: #2dd4bf;
            --orange: #fb923c;
            --chart-1: #3b82f6;
            --chart-2: #a78bfa;
            --chart-3: #2dd4bf;
            --chart-4: #f59e0b;
            --chart-5: #f472b6;
            --chart-6: #fb923c;
            --chart-7: #34d399;
            --chart-8: #60a5fa;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --surface-raised: #f1f5f9;
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-faint: #94a3b8;
            --border: #e2e8f0;
            --danger: #dc2626;
            --success: #059669;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background-color 0.3s, color 0.3s;
        }

        button, input, textarea, select { font-family: inherit; }

        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ---------- Header ---------- */

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header-left h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 2px 0;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            margin: 0;
            font-size: 12px;
            color: var(--text-faint);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--surface-color);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: var(--surface-raised); color: var(--text-main); }
        .icon-btn svg { width: 18px; height: 18px; }

        /* ---------- Stats ---------- */

        .stats-row {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .total-card {
            background: linear-gradient(145deg, var(--surface-color), var(--surface-raised));
            border-radius: 20px;
            padding: 22px 20px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .total-card h2, .stat-card h2 {
            margin: 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .total-card .amount {
            font-size: 36px;
            font-weight: 700;
            margin: 10px 0 0 0;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            line-height: 1;
        }

        [data-theme="light"] .total-card .amount { color: var(--text-main); text-shadow: none; }

        .stat-card .amount {
            font-size: 20px;
            font-weight: 700;
            margin: 8px 0 0 0;
            color: var(--text-main);
        }

        .stat-card .stat-label {
            font-size: 10px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        /* ---------- Category breakdown bar ---------- */

        .category-bar-section {
            background: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 20px;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .category-bar-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .category-bar-title h3 {
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .category-bar-title .period-label {
            font-size: 11px;
            color: var(--text-faint);
        }

        .category-bar {
            display: flex;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }

        [data-theme="light"] .category-bar { background: #e2e8f0; }

        .category-segment {
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .category-segment:hover { opacity: 0.8; transform: scaleY(1.15); }

        .category-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-amount {
            font-weight: 600;
            color: var(--text-main);
        }

        /* ---------- Toolbar ---------- */

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .search-wrap {
            position: relative;
            flex: 1;
        }

        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            background: var(--surface-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 11px 12px 11px 36px;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        #search-input::placeholder { color: var(--text-faint); }

        .filter-select {
            background: var(--surface-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 11px 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%2394a3b8'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 30px;
        }

        .filter-select:focus { outline: none; border-color: var(--primary); }

        .result-count {
            font-size: 12px;
            color: var(--text-faint);
            margin: -10px 0 16px 2px;
        }

        /* ---------- Receipt list ---------- */

        .receipt-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 40px;
        }

        .receipt-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s, background-color 0.15s;
            animation: fadeIn 0.4s ease-out;
            animation-fill-mode: both;
        }

        .receipt-card:active { transform: scale(0.99); }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .receipt-vendor {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .receipt-date {
            font-size: 12.5px;
            color: var(--text-muted);
        }

        .receipt-total {
            font-size: 19px;
            font-weight: 700;
            color: var(--primary);
            background: linear-gradient(135deg, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .receipt-items {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 12px 14px;
            margin-top: 14px;
            font-size: 13.5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: none;
        }

        [data-theme="light"] .receipt-items { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.05); }

        .receipt-items.expanded { display: block; }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 7px;
            color: var(--text-muted);
        }

        [data-theme="light"] .item-row { color: var(--text-muted); }

        .item-row:last-child { margin-bottom: 0; }

        .item-qty {
            opacity: 0.6;
            margin-right: 6px;
            font-size: 12px;
        }

        .expand-hint {
            font-size: 11.5px;
            color: var(--text-faint);
            margin-top: 6px;
        }

        .category-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 5px;
            letter-spacing: 0.3px;
        }

        .cat-general { background: rgba(59, 130, 246, 0.12); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.25); }
        .cat-food { background: rgba(251, 146, 60, 0.12); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.25); }
        .cat-transport { background: rgba(45, 212, 191, 0.12); color: #2dd4bf; border: 1px solid rgba(45, 212, 191, 0.25); }
        .cat-entertainment { background: rgba(244, 114, 182, 0.12); color: #f472b6; border: 1px solid rgba(244, 114, 182, 0.25); }
        .cat-shopping { background: rgba(167, 139, 250, 0.12); color: #a78bfa; border: 1px solid rgba(167, 139, 250, 0.25); }
        .cat-bills { background: rgba(245, 158, 11, 0.12); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.25); }
        .cat-health { background: rgba(52, 211, 153, 0.12); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.25); }
        .cat-other { background: rgba(96, 165, 250, 0.12); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.25); }

        .state-message {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .state-message .state-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .state-message .state-icon svg {
            width: 28px;
            height: 28px;
            color: var(--text-faint);
        }

        .state-message .state-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .state-message .state-sub {
            font-size: 13px;
            color: var(--text-faint);
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .state-message.error .state-title { color: var(--danger); }

        /* Skeleton loading */

        .skeleton-card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid var(--border);
            margin-bottom: 14px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--border) 25%, #40506b 37%, var(--border) 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease infinite;
        }

        @keyframes shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        .receipt-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        [data-theme="light"] .receipt-actions { border-top-color: var(--border); }

        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        [data-theme="light"] .btn-action { background: var(--surface-raised); }

        .btn-action:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .btn-edit:hover { color: var(--primary); border-color: var(--primary-glow); }
        .btn-delete:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.5); }

        /* ---------- Modals ---------- */

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-content h2 { margin: 0 0 20px 0; font-size: 18px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        [data-theme="light"] .form-group input, [data-theme="light"] .form-group textarea, [data-theme="light"] .form-group select {
            background: var(--surface-raised);
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #2563eb; }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-danger:hover { background: #dc2626; }

        /* Item editor rows */

        .item-editor-row {
            display: grid;
            grid-template-columns: 1fr 52px 70px 28px;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }

        .item-editor-row input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 7px;
            font-size: 13px;
            width: 100%;
        }

        [data-theme="light"] .item-editor-row input { background: var(--surface-raised); }

        .item-editor-row input:focus { outline: none; border-color: var(--primary); }

        .item-remove-btn {
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 4px;
        }

        .item-remove-btn:hover { color: var(--danger); }

        .item-editor-labels {
            display: grid;
            grid-template-columns: 1fr 52px 70px 28px;
            gap: 6px;
            font-size: 11px;
            color: var(--text-faint);
            margin-bottom: 6px;
            padding: 0 2px;
        }

        .add-item-btn {
            background: none;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
            margin-top: 4px;
            transition: all 0.2s;
        }

        .add-item-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .items-sum-row {
            display: flex;
            justify-content: space-between;
            font-size: 12.5px;
            color: var(--text-muted);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .items-sum-row button {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 12.5px;
            padding: 0;
            text-decoration: underline;
        }

        /* ---------- Toasts ---------- */

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: calc(100% - 40px);
            max-width: 420px;
        }

        .toast {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            animation: toastIn 0.25s ease-out;
        }

        .toast.success { border-color: rgba(16, 185, 129, 0.4); }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); }

        .toast .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .toast.success .dot { background: var(--success); }
        .toast.error .dot { background: var(--danger); }
        .toast.info .dot { background: var(--primary); }

        .toast.leaving { animation: toastOut 0.25s ease-in forwards; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(10px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 380px) {
            .stats-row { grid-template-columns: 1fr; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>Accounting</h1>
            <p id="header-subtitle">Track your expenses</p>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="theme-toggle" title="Toggle theme">
                <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="icon-btn" id="export-btn" title="Export to CSV">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>
    </div>

    <div class="stats-row">
        <div class="total-card">
            <h2>Total Spending</h2>
            <div class="amount" id="grand-total">...</div>
        </div>
        <div class="stat-card">

                <label for="edit-category">Category</label>

            <p style="color: var(--text-muted); font-size: 14px; margin: -10px 0 20px 0;">
                This removes <strong id="delete-target-label" style="color: var(--text-main);"></strong> permanently. This can't be undone.

            <div class="modal-actions">
                <button class="btn-action" id="delete-cancel-btn">Cancel</button>
                <button class="btn-danger" id="delete-confirm-btn">Delete</button>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ---------- IndexedDB helpers ----------

        function loadFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("AccountingDB", 1);
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        db.createObjectStore("sqlite");
                    }
                };
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        resolve(undefined);
                        return;
                    }
                    const tx = db.transaction("sqlite", "readonly");
                    const store = tx.objectStore("sqlite");
                    const getReq = store.get("db_file");
                    getReq.onsuccess = function() { resolve(getReq.result); };
                    getReq.onerror = function() { reject(getReq.error); };
                };
                request.onerror = function(event) { reject(event.target.error); };
            });
        }

        function saveToIndexedDB(buffer) {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("AccountingDB", 1);
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    const tx = db.transaction("sqlite", "readwrite");
                    const store = tx.objectStore("sqlite");
                    const putReq = store.put(buffer, "db_file");
                    putReq.onsuccess = function() { resolve(); };
                    putReq.onerror = function() { reject(putReq.error); };
                };
                request.onerror = function(event) { reject(event.target.error); };
            });
        }

        let AppSQL = null;
        let allReceipts = [];
        let pendingDeleteId = null;

        // ---------- Category colors ----------

        const CATEGORY_COLORS = {
            'Food': '#fb923c',
            'Transport': '#2dd4bf',
            'Entertainment': '#f472b6',
            'Shopping': '#a78bfa',
            'Bills': '#f59e0b',
            'Health': '#34d399',
            'General': '#3b82f6',
            'Other': '#60a5fa',
        };

        const CATEGORY_CLASSES = {
            'Food': 'cat-food',
            'Transport': 'cat-transport',
            'Entertainment': 'cat-entertainment',
            'Shopping': 'cat-shopping',
            'Bills': 'cat-bills',
            'Health': 'cat-health',
            'General': 'cat-general',
            'Other': 'cat-other',
        };

        function getCategoryColor(cat) {
            return CATEGORY_COLORS[cat] || CATEGORY_COLORS['Other'];
        }

        function getCategoryClass(cat) {
            return CATEGORY_CLASSES[cat] || CATEGORY_CLASSES['Other'];
        }

        // ---------- Theme ----------

        function initTheme() {
            const saved = localStorage.getItem('accounting-theme') || 'dark';
            applyTheme(saved);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('accounting-theme', theme);
            document.getElementById('theme-icon-dark').style.display = theme === 'dark' ? 'block' : 'none';
            document.getElementById('theme-icon-light').style.display = theme === 'light' ? 'block' : 'none';
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        // ---------- Database ----------

        async function getDatabase() {
            if (!AppSQL) AppSQL = await initSqlJs({ locateFile: file => file });
            const savedDb = await loadFromIndexedDB();
            const db = new AppSQL.Database(savedDb || undefined);

            try {
                db.run(`
                    CREATE TABLE IF NOT EXISTS receipts (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        vendor TEXT NOT NULL,
                        total REAL NOT NULL,
                        date TEXT NOT NULL,
                        items TEXT DEFAULT '[]',
                        category TEXT DEFAULT 'General',
                        created_at TEXT DEFAULT (datetime('now'))
                    )
                `);
                try { db.run("ALTER TABLE receipts ADD COLUMN category TEXT DEFAULT 'General'"); } catch (_) {}
                try { db.run("ALTER TABLE receipts ADD COLUMN created_at TEXT DEFAULT (datetime('now'))"); } catch (_) {}
            } catch (e) {
                console.error("DB init error:", e);
            }

            return db;
        }

        // ---------- Toasts ----------

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="dot"></span><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('leaving');
                setTimeout(() => toast.remove(), 250);
            }, 3200);
        }

        // ---------- Data loading ----------

        async function initDashboard() {
            try {
                const db = await getDatabase();
                const results = db.exec("SELECT id, vendor, total, date, items, category FROM receipts ORDER BY date DESC, id DESC");

                if (results.length === 0) {
                    allReceipts = [];
                    renderStats([]);
                    renderCategoryBar([]);
                    renderMonthFilter([]);
                    renderList([]);
                    return;
                }

                const columns = results[0].columns;
                allReceipts = results[0].values.map(row => {
                    let items = [];
                    try { items = JSON.parse(row[columns.indexOf('items')]) || []; } catch (e) {}
                    return {
                        id: row[columns.indexOf('id')],
                        vendor: row[columns.indexOf('vendor')] || 'Unknown Vendor',
                        total: Number(row[columns.indexOf('total')]) || 0,
                        date: row[columns.indexOf('date')] || '',
                        items,
                        category: row[columns.indexOf('category')] || 'General'
                    };
                });

                renderStats(allReceipts);
                renderCategoryBar(allReceipts);
                renderMonthFilter(allReceipts);
                applyFiltersAndRender();

                // Update header subtitle
                document.getElementById('header-subtitle').textContent = 
                    `${allReceipts.length} receipt${allReceipts.length === 1 ? '' : 's'} tracked`;

            } catch (e) {
                console.error(e);
                document.getElementById('receipt-list').innerHTML = `
                    <div class="state-message error">
                        <div class="state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        </div>
                        <div class="state-title">Couldn't load your data</div>
                        <div class="state-sub">${escapeHtml(e.message)}</div>
                    </div>`;
            }
        }

        function renderStats(receipts) {
            const total = receipts.reduce((sum, r) => sum + r.total, 0);
            const count = receipts.length;
            const avg = count > 0 ? total / count : 0;

            // This month's total
            const now = new Date();
            const monthStr = now.toISOString().slice(0, 7);
            const monthReceipts = receipts.filter(r => r.date.startsWith(monthStr));
            const monthTotal = monthReceipts.reduce((sum, r) => sum + r.total, 0);
            const monthName = now.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

            document.getElementById('grand-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('receipt-count').innerText = count;
            document.getElementById('receipt-average').innerText = `$${avg.toFixed(2)}`;
            document.getElementById('month-total').innerText = `$${monthTotal.toFixed(2)}`;
            document.getElementById('month-label').innerText = monthName;
        }

        // ---------- Category breakdown ----------

        function renderCategoryBar(receipts) {
            const section = document.getElementById('category-section');
            if (receipts.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            const categoryTotals = {};
            receipts.forEach(r => {
                const cat = r.category || 'General';
                categoryTotals[cat] = (categoryTotals[cat] || 0) + r.total;
            });

            const grandTotal = Object.values(categoryTotals).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);

            // Render bar
            const bar = document.getElementById('category-bar');
            bar.innerHTML = '';
            sorted.forEach(([cat, amount]) => {
                const pct = (amount / grandTotal) * 100;
                const seg = document.createElement('div');
                seg.className = 'category-segment';
                seg.style.width = pct + '%';
                seg.style.background = getCategoryColor(cat);
                seg.title = `${cat}: $${amount.toFixed(2)} (${pct.toFixed(1)}%)`;
                bar.appendChild(seg);
            });

            // Render legend
            const legend = document.getElementById('category-legend');
            legend.innerHTML = '';
            sorted.forEach(([cat, amount]) => {
                const pct = (amount / grandTotal) * 100;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <span class="legend-dot" style="background: ${getCategoryColor(cat)};"></span>
                    <span>${escapeHtml(cat)}</span>
                    <span class="legend-amount">$${amount.toFixed(2)}</span>
                    <span style="opacity:0.5; font-size:11px;">${pct.toFixed(0)}%</span>
                `;
                legend.appendChild(item);
            });
        }

        // ---------- Month filter ----------

        function renderMonthFilter(receipts) {
            const select = document.getElementById('month-filter');
            const currentValue = select.value;
            const months = [...new Set(receipts.map(r => r.date.slice(0, 7)))].sort().reverse();

            select.innerHTML = '<option value="all">All months</option>';
            months.forEach(month => {
                const date = new Date(month + '-01');
                const label = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                const count = receipts.filter(r => r.date.startsWith(month)).length;
                const opt = document.createElement('option');
                opt.value = month;
                opt.textContent = `${label} (${count})`;
                select.appendChild(opt);
            });

            if (currentValue && months.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        // ---------- Search / sort / filter ----------

        function applyFiltersAndRender() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const sortMode = document.getElementById('sort-select').value;
            const monthFilter = document.getElementById('month-filter').value;

            let filtered = allReceipts;

            // Month filter
            if (monthFilter !== 'all') {
                filtered = filtered.filter(r => r.date.startsWith(monthFilter));
            }

            // Search filter
            if (query) {
                filtered = filtered.filter(r => {
                    if (r.vendor.toLowerCase().includes(query)) return true;
                    return r.items.some(item => (item.name || '').toLowerCase().includes(query));
                });
            }

            // Sort
            const sorted = [...filtered].sort((a, b) => {
                switch (sortMode) {
                    case 'date_asc': return a.date.localeCompare(b.date) || a.id - b.id;
                    case 'total_desc': return b.total - a.total;
                    case 'total_asc': return a.total - b.total;
                    case 'vendor_asc': return a.vendor.localeCompare(b.vendor);
                    case 'date_desc':
                    default: return b.date.localeCompare(a.date) || b.id - a.id;
                }
            });

            // Update category bar for filtered set
            renderCategoryBar(sorted);

            const resultCountEl = document.getElementById('result-count');
            const hasFilters = query || monthFilter !== 'all';
            resultCountEl.innerText = hasFilters
                ? `${sorted.length} of ${allReceipts.length} receipt${allReceipts.length === 1 ? '' : 's'}`
                : '';

            // Update period label
            const periodLabel = document.getElementById('category-period');
            if (monthFilter !== 'all') {
                const date = new Date(monthFilter + '-01');
                periodLabel.textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } else {
                periodLabel.textContent = 'All time';
            }

            renderList(sorted, query);
        }

        function renderList(receipts, activeQuery) {
            const listEl = document.getElementById('receipt-list');

            if (allReceipts.length === 0) {
                listEl.innerHTML = `
                    <div class="state-message">
                        <div class="state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                        <div class="state-title">No receipts yet</div>
                        <div class="state-sub">Add an expense by uploading a receipt or typing something like "coffee 3.50".</div>
                    </div>`;
                return;
            }

            if (receipts.length === 0) {
                listEl.innerHTML = `
                    <div class="state-message">
                        <div class="state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </div>
                        <div class="state-title">No matches</div>
                        <div class="state-sub">Nothing found for "${escapeHtml(activeQuery || '')}".</div>
                    </div>`;
                return;
            }

            let html = '';
            receipts.forEach((r, index) => {
                let itemsHtml = '';
                if (r.items && r.items.length > 0) {
                    itemsHtml = `<div class="receipt-items" id="items-${r.id}">`;
                    r.items.forEach(item => {
                        const itemName = item.name || 'Item';
                        const itemPrice = item.price || 0;
                        const qty = item.quantity || 1;
                        itemsHtml += `
                            <div class="item-row">
                                <span><span class="item-qty">${qty}x</span> ${escapeHtml(itemName)}</span>
                                <span>$${Number(itemPrice * qty).toFixed(2)}</span>
                            </div>
                        `;
                    });
                    itemsHtml += `</div>`;
                }

                const hasItems = r.items && r.items.length > 0;
                const cat = r.category && r.category !== 'General' ? r.category : '';
                const catClass = getCategoryClass(r.category || 'General');

                html += `
                    <div class="receipt-card" style="animation-delay: ${Math.min(index * 0.06, 0.4)}s">
                        <div class="receipt-header" ${hasItems ? `onclick="toggleItems(${r.id})"` : ''}>
                            <div>
                                <div class="receipt-vendor">${escapeHtml(r.vendor)}</div>
                                <div class="receipt-date">${escapeHtml(r.date)}</div>
                                ${cat ? `<div class="category-badge ${catClass}">${escapeHtml(cat)}</div>` : ''}
                                ${hasItems ? `<div class="expand-hint">${r.items.length} item${r.items.length === 1 ? '' : 's'} · tap to expand</div>` : ''}
                            </div>
                            <div class="receipt-total">$${r.total.toFixed(2)}</div>
                        </div>
                        ${itemsHtml}
                        <div class="receipt-actions">
                            <button class="btn-action btn-edit" onclick="openEditModal(${r.id})">Edit</button>
                            <button class="btn-action btn-delete" onclick="openDeleteModal(${r.id})">Delete</button>
                        </div>
                    </div>
                `;
            });

            listEl.innerHTML = html;
        }

        function toggleItems(id) {
            const el = document.getElementById(`items-${id}`);
            if (el) el.classList.toggle('expanded');
        }

        // ---------- CSV Export ----------

        function exportToCSV() {
            if (allReceipts.length === 0) {
                showToast('No receipts to export.', 'error');
                return;
            }

            const headers = ['Date', 'Vendor', 'Category', 'Total', 'Item', 'Quantity', 'Price'];
            const rows = [headers];

            allReceipts.forEach(r => {
                if (r.items && r.items.length > 0) {
                    r.items.forEach((item, idx) => {
                        rows.push([
                            idx === 0 ? r.date : '',
                            idx === 0 ? r.vendor : '',
                            idx === 0 ? (r.category || 'General') : '',
                            idx === 0 ? r.total.toFixed(2) : '',
                            item.name || '',
                            item.quantity || 1,
                            (item.price || 0).toFixed(2)
                        ]);
                    });
                } else {
                    rows.push([r.date, r.vendor, r.category || 'General', r.total.toFixed(2), '', '', '']);
                }
            });

            const csv = rows.map(row =>
                row.map(field => `"${String(field).replace(/"/g, '""')}"`).join(',')
            ).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `expenses_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast(`Exported ${allReceipts.length} receipts to CSV.`, 'success');
        }

        document.getElementById('export-btn').addEventListener('click', exportToCSV);

        // ---------- Edit modal ----------

        let editItemRows = [];

        function openEditModal(id) {
            const receipt = allReceipts.find(r => r.id === id);
            if (!receipt) return;

            document.getElementById('edit-id').value = receipt.id;
            document.getElementById('edit-vendor').value = receipt.vendor;
            document.getElementById('edit-date').value = receipt.date;
            document.getElementById('edit-total').value = receipt.total;
            document.getElementById('edit-category').value = receipt.category || 'General';

            editItemRows = (receipt.items || []).map(i => ({
                name: i.name || '',
                quantity: i.quantity || 1,
                price: i.price || 0
            }));

            renderItemEditorRows();
            document.getElementById('edit-modal').classList.add('active');
            document.getElementById('edit-vendor').focus();
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function renderItemEditorRows() {
            const container = document.getElementById('item-editor-rows');
            container.innerHTML = '';
            editItemRows.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = 'item-editor-row';
                row.innerHTML = `
                    <input type="text" value="${escapeAttr(item.name)}" placeholder="Item name" data-field="name" data-idx="${idx}">
                    <input type="number" min="0" step="1" value="${item.quantity}" data-field="quantity" data-idx="${idx}">
                    <input type="number" min="0" step="0.01" value="${item.price}" data-field="price" data-idx="${idx}">
                    <button type="button" class="item-remove-btn" data-remove-idx="${idx}" title="Remove item">✕</button>
                `;
                container.appendChild(row);
            });
            updateItemsSum();
        }

        document.getElementById('item-editor-rows').addEventListener('input', (e) => {
            const idx = e.target.getAttribute('data-idx');
            const field = e.target.getAttribute('data-field');
            if (idx === null) return;
            if (field === 'name') editItemRows[idx].name = e.target.value;
            if (field === 'quantity') editItemRows[idx].quantity = parseFloat(e.target.value) || 0;
            if (field === 'price') editItemRows[idx].price = parseFloat(e.target.value) || 0;
            updateItemsSum();
        });

        document.getElementById('item-editor-rows').addEventListener('click', (e) => {
            const removeIdx = e.target.getAttribute('data-remove-idx');
            if (removeIdx !== null) {
                editItemRows.splice(Number(removeIdx), 1);
                renderItemEditorRows();
            }
        });

        document.getElementById('add-item-btn').addEventListener('click', () => {
            editItemRows.push({ name: '', quantity: 1, price: 0 });
            renderItemEditorRows();
            const rows = document.querySelectorAll('#item-editor-rows .item-editor-row');
            const lastRow = rows[rows.length - 1];
            if (lastRow) lastRow.querySelector('input').focus();
        });

        function updateItemsSum() {
            const sum = editItemRows.reduce((s, i) => s + (i.quantity * i.price), 0);
            document.getElementById('items-sum-display').innerText = `$${sum.toFixed(2)}`;
        }

        document.getElementById('use-sum-btn').addEventListener('click', () => {
            const sum = editItemRows.reduce((s, i) => s + (i.quantity * i.price), 0);
            document.getElementById('edit-total').value = sum.toFixed(2);
        });

        document.getElementById('edit-cancel-btn').addEventListener('click', closeEditModal);

        document.getElementById('edit-save-btn').addEventListener('click', async () => {
            const id = document.getElementById('edit-id').value;
            const vendor = document.getElementById('edit-vendor').value.trim();
            const date = document.getElementById('edit-date').value;
            const total = parseFloat(document.getElementById('edit-total').value);
            const category = document.getElementById('edit-category').value;

            if (!vendor) { showToast('Vendor name is required.', 'error'); return; }
            if (!date) { showToast('Date is required.', 'error'); return; }
            if (isNaN(total) || total < 0) { showToast('Enter a valid, non-negative total.', 'error'); return; }

            const cleanItems = editItemRows
                .filter(i => i.name.trim() !== '')
                .map(i => ({ name: i.name.trim(), quantity: i.quantity || 1, price: i.price || 0 }));

            try {
                const db = await getDatabase();
                db.run(
                    "UPDATE receipts SET vendor=?, date=?, total=?, items=?, category=? WHERE id=?",
                    [vendor, date, total, JSON.stringify(cleanItems), category, id]
                );
                await saveToIndexedDB(db.export());
                closeEditModal();
                showToast('Receipt updated.', 'success');
                initDashboard();
            } catch (e) {
                showToast(`Error saving: ${e.message}`, 'error');
            }
        });

        // ---------- Delete modal ----------

        function openDeleteModal(id) {
            const receipt = allReceipts.find(r => r.id === id);
            pendingDeleteId = id;
            document.getElementById('delete-target-label').innerText = receipt
                ? `${receipt.vendor} ($${receipt.total.toFixed(2)})`
                : 'this receipt';
            document.getElementById('delete-modal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('active');
            pendingDeleteId = null;
        }

        document.getElementById('delete-cancel-btn').addEventListener('click', closeDeleteModal);

        document.getElementById('delete-confirm-btn').addEventListener('click', async () => {
            if (pendingDeleteId === null) return;
            const id = pendingDeleteId;
            try {
                const db = await getDatabase();
                db.run("DELETE FROM receipts WHERE id = ?", [id]);
                await saveToIndexedDB(db.export());
                closeDeleteModal();
                showToast('Receipt deleted.', 'success');
                initDashboard();
            } catch (e) {
                showToast(`Error deleting: ${e.message}`, 'error');
            }
        });

        // ---------- Global listeners ----------

        document.getElementById('search-input').addEventListener('input', applyFiltersAndRender);
        document.getElementById('sort-select').addEventListener('change', applyFiltersAndRender);
        document.getElementById('month-filter').addEventListener('change', applyFiltersAndRender);

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    if (overlay.id === 'delete-modal') pendingDeleteId = null;
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('edit-modal').classList.remove('active');
                document.getElementById('delete-modal').classList.remove('active');
                pendingDeleteId = null;
            }
            // Ctrl/Cmd + K to focus search
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });

        function escapeHtml(unsafe) {
            return (unsafe || '').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function escapeAttr(unsafe) {
            return escapeHtml(unsafe);
        }

        // ---------- Init ----------

        initTheme();
        window.onload = initDashboard;
    </script>
</body>
</html>
